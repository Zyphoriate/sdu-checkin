<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自动打卡托管台</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260415b" />
    <script type="module" src="/static/app.js?v=20260415b" defer></script>
  </head>
  <body>
    <div class="auth-overlay" id="authOverlay">
      <section class="auth-card">
        <div class="panel-kicker">Authentication</div>
        <h2>输入管理密码</h2>
        <p>登录后才能查看托管账号、执行任务和接收完成提醒。</p>
        <form id="loginForm" class="auth-form">
          <label>
            <span>管理密码</span>
            <input id="loginPasswordInput" name="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="form-actions">
            <button type="submit" class="primary-button">登录管理台</button>
          </div>
          <div class="auth-error hidden" id="loginError"></div>
        </form>
      </section>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>

    <div class="shell">
      <header class="hero">
        <div class="hero-topbar">
          <div>
            <div class="hero-mark">Multi-user Auto Check-in</div>
            <h1>学生日常打卡托管台</h1>
          </div>
          <div class="hero-actions">
            <button type="button" class="ghost-button" id="notificationButton">启用桌面提醒</button>
            <button type="button" class="ghost-button hidden" id="logoutButton">退出登录</button>
          </div>
        </div>
        <div class="hero-meta">
          <span class="health-badge" id="healthBadge">请先登录</span>
          <span id="healthMeta">登录后显示服务状态，并在新任务完成时推送提醒。</span>
        </div>
      </header>

      <main class="layout hidden" id="appLayout">
        <section class="panel panel-form">
          <div class="panel-head">
            <div>
              <div class="panel-kicker">配置</div>
              <h2 id="formTitle">新增账号</h2>
            </div>
            <button type="button" class="ghost-button" id="resetFormButton">清空</button>
          </div>

          <form id="userForm" class="form-grid">
            <label>
              <span>备注名称</span>
              <input id="labelInput" name="label" type="text" placeholder="如：我自己 / 室友A" />
            </label>

            <label>
              <span>学号</span>
              <input id="studentNoInput" name="student_no" type="text" required placeholder="2022xxxxxxxx" />
            </label>

            <label class="full-width">
              <span>密码</span>
              <input id="passwordInput" name="password" type="password" placeholder="新增账号时请手动输入密码" />
              <small id="passwordHelp">系统不会预填默认密码。新增时必填；仅编辑已有账号时可留空并保留当前已存密码。</small>
            </label>

            <label>
              <span>每日执行时间</span>
              <input id="scheduleTimeInput" name="schedule_time" type="time" required value="07:30" />
            </label>

            <label>
              <span>目标状态</span>
              <select id="desiredStatusInput" name="desired_status">
                <option value="在校">在校</option>
                <option value="不在校">不在校</option>
              </select>
            </label>

            <div class="full-width nested-grid" id="offCampusFields">
              <label>
                <span>省/市/区</span>
                <input id="cityInput" name="off_campus_city" type="text" placeholder="如：杭州市" />
              </label>

              <label>
                <span>详细地址</span>
                <input id="districtInput" name="off_campus_district" type="text" placeholder="如：萧山区" />
              </label>

              <label class="full-width">
                <span>事由</span>
                <input id="reasonInput" name="off_campus_reason" type="text" placeholder="如：外出学习" />
              </label>
            </div>

            <label class="switch">
              <input id="enabledInput" name="enabled" type="checkbox" checked />
              <span>启用每日自动打卡</span>
            </label>

            <label class="switch">
              <input id="overwriteInput" name="overwrite_existing" type="checkbox" />
              <span>已有当日记录时允许覆盖</span>
            </label>

            <div class="form-actions full-width">
              <button type="submit" class="primary-button" id="submitButton">保存账号</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-kicker">账号</div>
              <h2>托管列表</h2>
            </div>
            <button type="button" class="ghost-button" id="refreshUsersButton">刷新</button>
          </div>
          <div class="table-shell">
            <table class="users-table">
              <thead>
                <tr>
                  <th>账号</th>
                  <th>时间</th>
                  <th>目标状态</th>
                  <th>策略</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
            <div class="empty-state" id="usersEmpty">还没有托管账号，先在左侧新增一个。</div>
          </div>
        </section>

        <section class="panel panel-wide">
          <div class="panel-head">
            <div>
              <div class="panel-kicker">日志</div>
              <h2>最近执行记录</h2>
            </div>
            <button type="button" class="ghost-button" id="refreshRunsButton">刷新</button>
          </div>
          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>账号</th>
                  <th>触发方式</th>
                  <th>结果</th>
                  <th>说明</th>
                </tr>
              </thead>
              <tbody id="runsTableBody"></tbody>
            </table>
            <div class="empty-state" id="runsEmpty">暂无运行记录。</div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
